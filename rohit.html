<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | F2R</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/png" href="/Logo-1.png">
    <link rel="stylesheet" href="./style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0f1014;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ── Login Form ── */
        #login-section {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100%;
        }

        .login-box {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: var(--glass-border);
            padding: 50px 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        .login-box h2 {
            font-family: var(--font-heading);
            margin-bottom: 24px;
        }

        .login-box input {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 14px 20px;
            border-radius: 12px;
            margin-bottom: 16px;
            color: #fff;
            font-family: var(--font-body);
        }

        .login-box input:focus {
            outline: none;
            border-color: rgba(255,255,255,0.3);
        }

        .login-box button {
            width: 100%;
            padding: 14px;
            background: #fff;
            color: #000;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .login-box button:hover {
            opacity: 0.9;
        }

        #login-error {
            color: var(--color-salmon);
            margin-top: 15px;
            font-size: 0.9rem;
            display: none;
        }

        /* ── Dashboard ── */
        #dashboard-section {
            display: none;
            width: 100%;
            max-width: 1200px;
            padding: 60px 24px;
        }

        .dash-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 20px;
        }

        .dash-header h1 {
            font-family: var(--font-heading);
        }

        .logout-btn {
            background: transparent;
            color: var(--color-text-muted);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
        }

        .tabs {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }

        .tab-btn {
            background: transparent;
            color: var(--color-text);
            border: none;
            font-size: 1.1rem;
            font-weight: 500;
            cursor: pointer;
            padding-bottom: 5px;
            border-bottom: 2px solid transparent;
        }

        .tab-btn.active {
            border-bottom-color: var(--color-pink);
            color: var(--color-pink);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* ── Tables ── */
        .data-table-wrapper {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th, td {
            padding: 16px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        th {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--color-text-muted);
        }

        td {
            font-size: 0.9rem;
            vertical-align: top;
        }

        .message-cell {
            max-width: 300px;
            white-space: pre-wrap;
            font-size: 0.85rem;
            color: rgba(255,255,255,0.7);
        }

        .view-pdf-btn {
            background: var(--color-blue);
            color: #fff;
            padding: 6px 12px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.8rem;
            display: inline-block;
            margin-right: 8px;
            margin-bottom: 8px;
            border: none;
            cursor: pointer;
        }

        .btn-danger {
            background: var(--color-salmon);
        }

        .date-cell {
            font-size: 0.8rem;
            color: var(--color-text-muted);
        }
        
        .action-cell {
            min-width: 120px;
        }
    </style>
</head>
<body>

    <div id="gradient-bg"></div>

    <!-- LOGIN UI -->
    <div id="login-section">
        <div class="login-box">
            <h2>F2R Admin</h2>
            <form id="login-form">
                <input type="text" id="username" placeholder="Username" required>
                <input type="password" id="password" placeholder="Password" required>
                <button type="submit" id="login-submit">Access Records</button>
            </form>
            <div id="login-error">Invalid credentials</div>
        </div>
    </div>

    <!-- DASHBOARD UI -->
    <div id="dashboard-section">
        <div class="dash-header">
            <h1>Dashboard</h1>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('enquiries')">Enquiries</button>
            <button class="tab-btn" onclick="switchTab('declarations')">Declarations</button>
        </div>

        <!-- Enquiries Tab -->
        <div id="enquiries-tab" class="tab-content active">
            <div class="data-table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Name</th>
                            <th>Contact</th>
                            <th>Type & Length</th>
                            <th>Message</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="enquiries-body">
                        <!-- Populated by JS -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Declarations Tab -->
        <div id="declarations-tab" class="tab-content">
            <div class="data-table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Submission Time</th>
                            <th>Document</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="declarations-body">
                        <!-- Populated by JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const loginSection = document.getElementById('login-section');
        const dashSection = document.getElementById('dashboard-section');
        const loginForm = document.getElementById('login-form');
        const errorMsg = document.getElementById('login-error');
        const submitBtn = document.getElementById('login-submit');

        let dashboardData = null;

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;

            submitBtn.textContent = "Verifying...";
            errorMsg.style.display = 'none';

            try {
                const res = await fetch('/api/admin-fetch', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: u, password: p })
                });

                const json = await res.json();

                if (!res.ok) {
                    throw new Error(json.error || 'Failed to authenticate');
                }

                // Success
                dashboardData = json.data;
                renderData();
                loginSection.style.display = 'none';
                dashSection.style.display = 'block';

            } catch (err) {
                errorMsg.textContent = err.message;
                errorMsg.style.display = 'block';
            } finally {
                submitBtn.textContent = "Access Records";
            }
        });

        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(tab + '-tab').classList.add('active');
        }

        function logout() {
            dashboardData = null;
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
            dashSection.style.display = 'none';
            loginSection.style.display = 'flex';
        }

        function renderData() {
            const eb = document.getElementById('enquiries-body');
            const db = document.getElementById('declarations-body');
            
            // Render Enquiries
            eb.innerHTML = dashboardData.enquiries.map(eq => `
                <tr>
                    <td class="date-cell">${new Date(eq.created_at).toLocaleDateString()}</td>
                    <td><strong>${eq.name || 'N/A'}</strong></td>
                    <td>
                        <div>${eq.email || 'N/A'}</div>
                        <div style="font-size: 0.8rem; color: #aaa;">${eq.phone || ''}</div>
                    </td>
                    <td>
                        <div>${eq.shoot_type || 'N/A'}</div>
                        <div style="font-size: 0.8rem; color: var(--color-pink);">${eq.shoot_length || ''}</div>
                    </td>
                    <td class="message-cell">${eq.message || ''}</td>
                    <td class="action-cell">
                        <button onclick="downloadText(${eq.id})" class="view-pdf-btn">Download TXT</button>
                        <button onclick="deleteRecord('enquiries', ${eq.id})" class="view-pdf-btn btn-danger">Delete</button>
                    </td>
                </tr>
            `).join('') || `<tr><td colspan="6" style="text-align:center">No enquiries yet</td></tr>`;

            // Render Declarations
            db.innerHTML = dashboardData.declarations.map(dec => `
                <tr>
                    <td class="date-cell">${new Date(dec.created_at).toLocaleDateString()}</td>
                    <td><strong>${dec.name || 'N/A'}</strong></td>
                    <td>${dec.email || 'N/A'}</td>
                    <td class="date-cell">${dec.time || 'N/A'}</td>
                    <td>
                        ${dec.pdf_base64 
                            ? `<a href="${dec.pdf_base64}" download="${(dec.name||'Client').replace(/\\s+/g, '_')}_Declaration.pdf" class="view-pdf-btn">Download PDF</a>`
                            : `<span style="color:#666">No PDF</span>`
                        }
                    </td>
                    <td class="action-cell">
                        <button onclick="deleteRecord('declarations', ${dec.id})" class="view-pdf-btn btn-danger">Delete</button>
                    </td>
                </tr>
            `).join('') || `<tr><td colspan="6" style="text-align:center">No declarations yet</td></tr>`;
        }

        async function deleteRecord(table, id) {
            if (!confirm('Are you sure you want to permanently delete this record?')) return;

            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;

            try {
                const res = await fetch('/api/admin-delete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: u, password: p, table, id })
                });

                if (!res.ok) throw new Error('Deletion failed');

                // Remove from local data array and re-render so we don't have to fetch all again
                dashboardData[table] = dashboardData[table].filter(item => item.id !== id);
                renderData();
                alert('Record deleted successfully.');
            } catch (err) {
                alert('Error: ' + err.message);
            }
        }

        function downloadText(id) {
            const eq = dashboardData.enquiries.find(item => item.id === id);
            if (!eq) return;

            const content = \`Frame 2 Remember - Enquiry Details\\n\` +
                            \`=================================\\n\\n\` +
                            \`Date Submitted: \${new Date(eq.created_at).toLocaleString()}\\n\` +
                            \`Name: \${eq.name || 'N/A'}\\n\` +
                            \`Email: \${eq.email || 'N/A'}\\n\` +
                            \`Phone: \${eq.phone || 'N/A'}\\n\` +
                            \`Shoot Type: \${eq.shoot_type || 'N/A'}\\n\` +
                            \`Expected Length: \${eq.shoot_length || 'N/A'}\\n\\n\` +
                            \`Requirements / Message:\\n\` +
                            \`-----------------------\\n\` +
                            \`\${eq.message || 'None'}\\n\`;

            const blob = new Blob([content], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = \`Enquiry_\${(eq.name || 'Client').replace(/\\s+/g, '_')}.txt\`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
